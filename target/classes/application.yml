server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tomato_health_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: tomatoHealthSecretKeyForJWTAuthentication2024VeryLongSecureKey
  expiration: 86400000

# Flask ML Service Configuration
ml:
  service:
    url: http://localhost:5000

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# SpringDoc / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

# Logging
logging:
  level:
    com.tomatohealth: DEBUG
    org.springframework.security: DEBUG
